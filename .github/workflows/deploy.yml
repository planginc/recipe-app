name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CONVEX_SITE_URL: ${{ secrets.VITE_CONVEX_SITE_URL }}
          VITE_AI_CHAT_URL: ${{ secrets.VITE_AI_CHAT_URL }}
          VITE_AUTO_TAG_URL: ${{ secrets.VITE_AUTO_TAG_URL }}
          VITE_DB_BACKEND: convex
          VITE_USER_TELEGRAM_ID: ${{ secrets.VITE_USER_TELEGRAM_ID }}
